<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Medical Note Rephraser</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f0f4f8;
    color: #1a202c;
    min-height: 100vh;
  }

  /* ── Header ────────────────────────────────────────────────── */
  .header {
    background: linear-gradient(135deg, #1e40af 0%, #1a56db 100%);
    color: white;
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header-icon { font-size: 28px; }
  .header-title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .header-sub   { font-size: 12px; opacity: 0.75; margin-top: 1px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  /* ── Layout ─────────────────────────────────────────────────── */
  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 20px 28px;
    max-width: 1400px;
    margin: 0 auto;
  }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

  /* ── Card ───────────────────────────────────────────────────── */
  .card {
    background: white;
    border-radius: 14px;
    padding: 22px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: #1e40af;
    display: flex;
    align-items: center;
    gap: 7px;
    padding-bottom: 10px;
    border-bottom: 2px solid #eff6ff;
  }

  /* ── Form elements ──────────────────────────────────────────── */
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  select, textarea, input {
    width: 100%;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 14px;
    color: #1a202c;
    background: white;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  select:focus, textarea:focus, input:focus {
    outline: none;
    border-color: #1a56db;
    box-shadow: 0 0 0 3px rgba(26,86,219,0.12);
  }
  textarea { resize: vertical; line-height: 1.65; }

  /* ── Purpose selector ───────────────────────────────────────── */
  .purpose-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 7px;
  }
  .purpose-btn {
    padding: 8px 6px;
    border: 1.5px solid #e5e7eb;
    border-radius: 8px;
    background: white;
    font-size: 11.5px;
    font-weight: 600;
    color: #374151;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .purpose-btn:hover { border-color: #1a56db; color: #1a56db; background: #eff6ff; }
  .purpose-btn.active {
    border-color: #1a56db;
    background: #1a56db;
    color: white;
  }

  /* ── Context section (collapsible) ─────────────────────────── */
  .context-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    color: #6b7280;
    cursor: pointer;
    user-select: none;
    padding: 6px 0;
  }
  .context-toggle:hover { color: #1a56db; }
  .context-body { display: none; flex-direction: column; gap: 8px; }
  .context-body.open { display: flex; }
  .context-row { display: grid; grid-template-columns: 1fr 2fr; gap: 8px; align-items: center; }
  .context-row label { margin: 0; font-size: 11px; }

  /* ── Buttons ────────────────────────────────────────────────── */
  .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn {
    padding: 12px;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }
  .btn-primary { background: #1a56db; color: white; }
  .btn-primary:hover { background: #1e40af; }
  .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
  .btn-outline { background: white; color: #1a56db; border: 2px solid #1a56db; }
  .btn-outline:hover { background: #eff6ff; }
  .btn-clear  { background: #f9fafb; color: #6b7280; border: 1.5px solid #e5e7eb; font-size: 13px; padding: 9px; }
  .btn-clear:hover { background: #f3f4f6; }

  /* ── Word counter ───────────────────────────────────────────── */
  .input-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11.5px;
    color: #9ca3af;
  }
  .model-hint {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    background: #eff6ff;
    color: #1e40af;
  }
  .model-hint.m72 { background: #fef3c7; color: #92400e; }

  /* ── Output area ────────────────────────────────────────────── */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    min-height: 28px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11.5px;
    font-weight: 700;
  }
  .badge-pass     { background: #d1fae5; color: #065f46; }
  .badge-fallback { background: #fef3c7; color: #92400e; }
  .badge-error    { background: #fee2e2; color: #991b1b; }
  .badge-stream   { background: #dbeafe; color: #1e40af; }
  .badge-idle     { background: #f3f4f6; color: #6b7280; }
  .latency        { font-size: 12px; color: #6b7280; margin-left: auto; }

  .output-box {
    background: #f8fafc;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    padding: 16px;
    min-height: 260px;
    font-size: 14px;
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: break-word;
    position: relative;
    flex: 1;
    overflow-y: auto;
    max-height: 480px;
  }
  .output-box.streaming { border-color: #93c5fd; }
  .output-placeholder { color: #9ca3af; font-style: italic; }

  /* Blinking cursor */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: #1a56db;
    margin-left: 1px;
    vertical-align: text-bottom;
    animation: blink 0.9s step-start infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Markdown rendering in output */
  .output-box strong { font-weight: 700; }
  .output-box .md-h  { font-weight: 700; color: #1e40af; font-size: 13px; margin-top: 4px; }
  .output-box .md-li { margin-left: 16px; }

  .output-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: #9ca3af;
  }
  .copy-btn {
    padding: 6px 14px;
    border: 1.5px solid #e5e7eb;
    border-radius: 7px;
    background: white;
    font-size: 12px;
    font-weight: 600;
    color: #374151;
    cursor: pointer;
  }
  .copy-btn:hover { border-color: #1a56db; color: #1a56db; }
  .copy-btn.copied { border-color: #10b981; color: #10b981; }

  /* ── Progress bar ───────────────────────────────────────────── */
  .progress-bar {
    height: 3px;
    background: #e5e7eb;
    border-radius: 3px;
    overflow: hidden;
    display: none;
  }
  .progress-bar.active { display: block; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #1a56db, #60a5fa);
    width: 0%;
    animation: progress-anim 2.5s ease-in-out infinite;
    border-radius: 3px;
  }
  @keyframes progress-anim {
    0%   { width: 0%;   margin-left: 0; }
    50%  { width: 60%;  margin-left: 20%; }
    100% { width: 0%;   margin-left: 100%; }
  }
</style>
</head>
<body>

<!-- ── Header ───────────────────────────────────────────────────── -->
<div class="header">
  <div class="header-icon">🏥</div>
  <div>
    <div class="header-title">Medical Note Rephraser</div>
    <div class="header-sub">AI-powered clinical documentation assistant</div>
  </div>
  <div class="header-right">
    <div class="badge badge-pass" style="font-size:12px;" id="api-status">● API Ready</div>
  </div>
</div>

<!-- ── Main layout ───────────────────────────────────────────────── -->
<div class="layout">

  <!-- ── LEFT: Input panel ──────────────────────────────────────── -->
  <div class="card">
    <div class="card-title">✏️ Input</div>

    <!-- Purpose selector -->
    <div>
      <label>Section Purpose</label>
      <div class="purpose-grid" id="purpose-grid">
        <button class="purpose-btn active" data-purpose="chief_complaint">Chief<br>Complaint</button>
        <button class="purpose-btn" data-purpose="diagnosis">Diagnosis</button>
        <button class="purpose-btn" data-purpose="investigations">Investiga-<br>tions</button>
        <button class="purpose-btn" data-purpose="medications">Medications</button>
        <button class="purpose-btn" data-purpose="procedures">Procedures</button>
        <button class="purpose-btn" data-purpose="vitals">Vitals</button>
        <button class="purpose-btn" data-purpose="advice_followup">Advice &<br>Follow-up</button>
        <button class="purpose-btn" data-purpose="doctors_notes">Doctor's<br>Notes</button>
        <button class="purpose-btn" data-purpose="clinical_notes">Clinical<br>Notes</button>
        <button class="purpose-btn" data-purpose="summary">Summary</button>
      </div>
    </div>

    <!-- Text input -->
    <div>
      <label>Medical Note Text</label>
      <textarea id="input-text" rows="11"
        placeholder="Type or paste the medical note here...&#10;&#10;Examples:&#10;• 'patient has high BP and sugar problems'&#10;• 'pt came with chest pain since 2 day, sweating, BP 158/96'&#10;• 'gave metformin 500mg two time daily for sugar'"></textarea>
    </div>

    <!-- Input meta -->
    <div class="input-meta">
      <span id="word-count">0 words</span>
      <span class="model-hint" id="model-hint">7B · fast</span>
    </div>

    <!-- Context (collapsible) -->
    <div>
      <div class="context-toggle" onclick="toggleContext()">
        <span id="ctx-arrow">▶</span>
        <span>Add Context (other note sections)</span>
      </div>
      <div class="context-body" id="context-body">
        <div class="context-row">
          <label>Chief Complaint</label>
          <input type="text" id="ctx-chief_complaint" placeholder="e.g. chest pain" />
        </div>
        <div class="context-row">
          <label>Diagnosis</label>
          <input type="text" id="ctx-diagnosis" placeholder="e.g. acute STEMI" />
        </div>
        <div class="context-row">
          <label>Medications</label>
          <input type="text" id="ctx-medications" placeholder="e.g. aspirin 75mg" />
        </div>
        <div class="context-row">
          <label>Investigations</label>
          <input type="text" id="ctx-investigations" placeholder="e.g. ECG, troponin" />
        </div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="btn-group">
      <button class="btn btn-primary" id="btn-stream" onclick="doStream()">
        ▶ Stream Rephrase
      </button>
      <button class="btn btn-outline" id="btn-instant" onclick="doInstant()">
        ⚡ Instant
      </button>
    </div>
    <button class="btn btn-clear" onclick="clearAll()">🗑 Clear</button>
  </div>

  <!-- ── RIGHT: Output panel ────────────────────────────────────── -->
  <div class="card">
    <div class="card-title">📋 Rephrased Output</div>

    <!-- Status bar -->
    <div class="status-bar" id="status-bar">
      <span class="badge badge-idle" id="status-badge">Waiting...</span>
    </div>

    <!-- Progress bar -->
    <div class="progress-bar" id="progress-bar">
      <div class="progress-fill"></div>
    </div>

    <!-- Output -->
    <div class="output-box" id="output-box">
      <span class="output-placeholder">Rephrased text will appear here...</span>
    </div>

    <!-- Footer -->
    <div class="output-footer">
      <span id="output-meta">—</span>
      <button class="copy-btn" id="copy-btn" onclick="copyOutput()">Copy</button>
    </div>
  </div>

</div>

<script>
// ── State ────────────────────────────────────────────────────────
let selectedPurpose = 'chief_complaint';
let isStreaming = false;
let streamController = null;
let outputText = '';
let startTime = 0;

// ── Purpose selector ─────────────────────────────────────────────
document.querySelectorAll('.purpose-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.purpose-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedPurpose = btn.dataset.purpose;
    updateModelHint();
  });
});

function updateModelHint() {
  const words = getInputText().split(/\s+/).filter(Boolean).length;
  const hint = document.getElementById('model-hint');
  document.getElementById('word-count').textContent = `${words} word${words !== 1 ? 's' : ''}`;
  if (selectedPurpose === 'doctors_notes' && words > 50) {
    hint.textContent = '72B · structured';
    hint.className = 'model-hint m72';
  } else {
    hint.textContent = '7B · fast';
    hint.className = 'model-hint';
  }
}

document.getElementById('input-text').addEventListener('input', updateModelHint);

// ── Context toggle ───────────────────────────────────────────────
function toggleContext() {
  const body  = document.getElementById('context-body');
  const arrow = document.getElementById('ctx-arrow');
  const open  = body.classList.toggle('open');
  arrow.textContent = open ? '▼' : '▶';
}

function getContext() {
  const keys = ['chief_complaint', 'diagnosis', 'medications', 'investigations'];
  const ctx = {};
  keys.forEach(k => {
    const v = document.getElementById(`ctx-${k}`).value.trim();
    if (v) ctx[k] = v;
  });
  return ctx;
}

function getInputText() { return document.getElementById('input-text').value; }

// ── Clear ────────────────────────────────────────────────────────
function clearAll() {
  if (isStreaming && streamController) streamController.abort();
  document.getElementById('input-text').value = '';
  resetOutput();
  updateModelHint();
}

function resetOutput() {
  outputText = '';
  const box = document.getElementById('output-box');
  box.innerHTML = '<span class="output-placeholder">Rephrased text will appear here...</span>';
  box.classList.remove('streaming');
  setStatus('idle', 'Waiting...');
  document.getElementById('progress-bar').classList.remove('active');
  document.getElementById('output-meta').textContent = '—';
  document.getElementById('btn-stream').disabled = false;
  document.getElementById('btn-instant').disabled = false;
  isStreaming = false;
}

// ── Status helper ─────────────────────────────────────────────────
function setStatus(type, text) {
  const badge = document.getElementById('status-badge');
  badge.className = `badge badge-${type}`;
  badge.textContent = text;
}

// ── Render markdown (basic) ──────────────────────────────────────
function renderMarkdown(raw) {
  const escaped = raw
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  return escaped
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^#{1,2} (.+)$/gm, '<span class="md-h">$1</span>')
    .replace(/^- (.+)$/gm, '<span class="md-li">• $1</span>')
    .replace(/\n/g, '<br>');
}

// ── STREAM REPHRASE ──────────────────────────────────────────────
async function doStream() {
  const text = getInputText().trim();
  if (!text) { alert('Please enter some text first.'); return; }
  if (isStreaming) { streamController?.abort(); return; }

  isStreaming = true;
  outputText = '';
  startTime = performance.now();

  const box = document.getElementById('output-box');
  box.innerHTML = '';
  box.classList.add('streaming');

  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  box.appendChild(cursor);

  document.getElementById('progress-bar').classList.add('active');
  document.getElementById('btn-stream').disabled = true;
  document.getElementById('btn-instant').disabled = true;
  setStatus('stream', '⏳ Streaming...');

  streamController = new AbortController();
  let rawBuf = '';

  try {
    const resp = await fetch('/rephrase/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: streamController.signal,
      body: JSON.stringify({
        text,
        purpose: selectedPurpose,
        context: getContext(),
        patient_id: 'ui-session',
      }),
    });

    if (!resp.ok) {
      throw new Error(`HTTP ${resp.status}`);
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();

    // labeled break so [DONE] exits all three loops at once
    outer: while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      rawBuf += decoder.decode(value, { stream: true });
      // SSE messages are separated by \n\n
      const parts = rawBuf.split('\n\n');
      rawBuf = parts.pop(); // keep incomplete trailing chunk

      for (const part of parts) {
        for (const line of part.split('\n')) {
          if (line.startsWith('event: error')) {
            throw new Error('Server error during stream');
          }
          if (line.startsWith('data: ')) {
            const raw = line.slice(6);
            if (raw === '[DONE]') break outer;
            // Server JSON-encodes tokens so \n and special chars survive SSE framing
            let token;
            try { token = JSON.parse(raw); } catch { token = raw; }
            outputText += token;
            box.insertBefore(document.createTextNode(token), cursor);
            box.scrollTop = box.scrollHeight;
          }
        }
      }
    }

    // Apply markdown rendering now that we have the full text
    cursor.remove();
    box.innerHTML = renderMarkdown(outputText);

    const ms = Math.round(performance.now() - startTime);
    const inW  = text.split(/\s+/).filter(Boolean).length;
    const outW = outputText.split(/\s+/).filter(Boolean).length;

    setStatus('pass', '✓ Done');
    document.getElementById('output-meta').textContent =
      `${inW} words in → ${outW} words out  ·  ${(ms/1000).toFixed(1)}s`;

  } catch (e) {
    if (e.name !== 'AbortError') {
      setStatus('error', '✕ Error');
      box.insertBefore(document.createTextNode('\n[Stream error: ' + e.message + ']'), cursor);
      cursor.remove();
    } else {
      cursor.remove();
      setStatus('idle', 'Cancelled');
    }
  } finally {
    box.classList.remove('streaming');
    document.getElementById('progress-bar').classList.remove('active');
    document.getElementById('btn-stream').disabled = false;
    document.getElementById('btn-instant').disabled = false;
    isStreaming = false;
  }
}

// ── INSTANT REPHRASE ─────────────────────────────────────────────
async function doInstant() {
  const text = getInputText().trim();
  if (!text) { alert('Please enter some text first.'); return; }
  if (isStreaming) return;

  outputText = '';
  startTime = performance.now();

  const box = document.getElementById('output-box');
  box.innerHTML = '<span class="output-placeholder">Thinking...</span>';

  document.getElementById('progress-bar').classList.add('active');
  document.getElementById('btn-stream').disabled = true;
  document.getElementById('btn-instant').disabled = true;
  setStatus('stream', '⏳ Processing...');

  try {
    const resp = await fetch('/rephrase', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text,
        purpose: selectedPurpose,
        context: getContext(),
        patient_id: 'ui-session',
      }),
    });

    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || `HTTP ${resp.status}`);

    const ms   = Math.round(performance.now() - startTime);
    outputText = data.rephrased || '';

    // Render markdown
    box.innerHTML = renderMarkdown(outputText);

    const inW  = text.split(/\s+/).filter(Boolean).length;
    const outW = outputText.split(/\s+/).filter(Boolean).length;

    if (data.fallback) {
      setStatus('fallback', '⚠ Fallback — original returned');
    } else {
      setStatus('pass', '✓ Done');
    }
    document.getElementById('output-meta').textContent =
      `${inW} words in → ${outW} words out  ·  ${(ms/1000).toFixed(1)}s`;

  } catch (e) {
    setStatus('error', '✕ Error: ' + e.message);
    box.innerHTML = '<span style="color:#991b1b">Request failed: ' + e.message + '</span>';
  } finally {
    document.getElementById('progress-bar').classList.remove('active');
    document.getElementById('btn-stream').disabled = false;
    document.getElementById('btn-instant').disabled = false;
  }
}

// ── Copy ─────────────────────────────────────────────────────────
function copyOutput() {
  if (!outputText) return;
  navigator.clipboard.writeText(outputText).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

// ── Health check on load ─────────────────────────────────────────
(async () => {
  try {
    const r = await fetch('/health');
    if (!r.ok) throw new Error();
    document.getElementById('api-status').textContent = '● API Ready';
    document.getElementById('api-status').className = 'badge badge-pass';
  } catch {
    document.getElementById('api-status').textContent = '● API Offline';
    document.getElementById('api-status').className = 'badge badge-error';
  }
})();

// ── Keyboard shortcut: Ctrl+Enter to stream ──────────────────────
document.getElementById('input-text').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); doStream(); }
});
</script>
</body>
</html>
